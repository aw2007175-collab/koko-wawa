<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Circle</title>

<style>
    body {
        background-color: #1f2428;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    .circle {
        width: 260px;  /* كبرنا الدائرة */
        height: 260px;
        background-color: #d3d6da;
        border-radius: 1%;
        display:block;
        justify-content: center;
        align-items: center;    
        position: relative;

        animation: spin 1s linear infinite, pulse 0.6s ease-in-out infinite;
        animation-play-state: paused;

        transition: transform 0.2s ease;
        overflow: hidden; /* يخلي الصورة جوا الدائرة */
    }

    .circle img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* تخلي الصورة تملى الدائرة */
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes pulse {
        0%,100% { box-shadow: 0 0 10px #fff; }
        50% { box-shadow: 0 0 40px #fff; }
    }
</style>

</head>
<body>

<div class="circle" id="circle">
    <img src="/Users/hp/OneDrive/Desktop/Screenshot_2026-02-21-10-32-44-62_1c337646f29875672b5a61192b9010f9.jpg" alt="image">
</div>

<script>
    const circle = document.getElementById("circle");
    let zoomInterval;
    let scale = 1;

    document.addEventListener("mousemove", (e) => {
        const rect = circle.getBoundingClientRect();
        const circleX = rect.left + rect.width / 2;
        const circleY = rect.top + rect.height / 2;

        const distance = Math.hypot(e.clientX - circleX, e.clientY - circleY);

        if (distance < 140) {
            circle.style.animationPlayState = "running";

            const moveX = (e.clientX - circleX) / 8;
            const moveY = (e.clientY - circleY) / 8;

            if (!zoomInterval) {
                zoomInterval = setInterval(() => {
                    scale = 1 + Math.random() * 0.4;
                }, 200);
            }

            circle.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;

        } else {
            circle.style.animationPlayState = "paused";
            circle.style.transform = "translate(0,0) scale(1)";

            clearInterval(zoomInterval);
            zoomInterval = null;
        }
    });
</script>

</body>
</html>
