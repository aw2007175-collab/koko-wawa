<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zoom Circle</title>

<style>
    body {
        background-color: #1f2428;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    .circle {
        width: 200px;
        height: 200px;
        background-color: #d3d6da;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 80px;
        font-weight: bold;
        color: #2c3136;
        font-family: Arial, sans-serif;
        position: relative;

        animation: spin .01111s linear infinite, pulse 0.6s ease-in-out infinite;
        animation-play-state: paused;

        transition: transform 0.2s ease;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes pulse {
        0%,100% { box-shadow: 0 0 10px #fff; }
        50% { box-shadow: 0 0 40px #fff; }
    }
</style>

</head>
<body>

<div class="circle" id="circle">67</div>

<script>
    const circle = document.getElementById("circle");
    let zoomInterval;
    let scale = 1;

    document.addEventListener("mousemove", (e) => {
        const rect = circle.getBoundingClientRect();
        const circleX = rect.left + rect.width / 2;
        const circleY = rect.top + rect.height / 2;

        const distance = Math.hypot(e.clientX - circleX, e.clientY - circleY);

        if (distance < 110) {
            circle.style.animationPlayState = "running";

            const moveX = (e.clientX - circleX) / 8;
            const moveY = (e.clientY - circleY) / 8;

            // زوم عشوائي
            if (!zoomInterval) {
                zoomInterval = setInterval(() => {
                    scale = 1 + Math.random() * 0.4; // تكبير عشوائي
                }, 200);
            }

            // دمج الحركة + الزوم
            circle.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;

        } else {
            circle.style.animationPlayState = "paused";
            circle.style.transform = "translate(0,0) scale(1)";

            clearInterval(zoomInterval);
            zoomInterval = null;
        }
    });
</script>

</body>
</html>
